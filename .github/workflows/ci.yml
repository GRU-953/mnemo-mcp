name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        # The logic smoke tests run fully offline — no Ollama, no models, no
        # MarkItDown — so only these light deps are needed.
        run: python -m pip install --upgrade pip numpy jinja2 requests
      - name: Run smoke tests
        run: PYTHONPATH=. python tests/test_smoke.py
